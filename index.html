<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>LeoCore</title>

  <!-- Prevent white flash -->
  <style>
    html, body { background: #000; }
  </style>

  <link rel="stylesheet" href="style.css?v=FINAL" />
</head>
<body>

  <!-- ================= BACKGROUND ================= -->
  <div id="bg-root" aria-hidden="true">
    <video
      id="bg-video"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      poster="waves-blur.jpg"
    >
      <source src="background.mp4" type="video/mp4" />
    </video>

    <div class="bg-soften"></div>
    <div class="bg-vignette"></div>
    <div class="bg-bloom"></div>
  </div>

  <!-- ================= UI ================= -->
  <div class="app-wrapper">

    <!-- HERO -->
    <section class="center-wrapper">
      <button class="hero-input" type="button">
        <div class="hero-ambient"></div>
        <span class="hero-text" id="hero-text">Message LeoCore</span>
        <div class="hero-energy"></div>
      </button>

      <h1 class="main-title">LEOCORE</h1>
      <p class="subtitle">Your AI. Your Vibe.</p>
    </section>

    <!-- MODES -->
    <section class="modes-wrapper">
      <h2 class="section-title">Choose Your Mode</h2>

      <div class="mode-grid">

        <button class="neon-btn recommended">
          <div class="mode-content">
            <div class="mode-title">⚡ Default</div>
            <div class="mode-desc">Balanced answers for everyday questions</div>
          </div>
          <div class="mode-badge">Recommended</div>
        </button>

        <button class="neon-btn">
          <div class="mode-content">
            <div class="mode-title">📘 Study</div>
            <div class="mode-desc">Clear explanations with examples</div>
          </div>
        </button>

        <button class="neon-btn">
          <div class="mode-content">
            <div class="mode-title">🔬 Research</div>
            <div class="mode-desc">Detailed, structured, and factual</div>
          </div>
        </button>

        <button class="neon-btn">
          <div class="mode-content">
            <div class="mode-title">📖 Reading</div>
            <div class="mode-desc">Summaries and simplified explanations</div>
          </div>
        </button>

        <button class="neon-btn">
          <div class="mode-content">
            <div class="mode-title">🧠 Deep</div>
            <div class="mode-desc">Long-form reasoning and insights</div>
          </div>
        </button>

        <button class="neon-btn">
          <div class="mode-content">
            <div class="mode-title">😎 Chill</div>
            <div class="mode-desc">Casual, friendly conversation</div>
          </div>
        </button>

        <button class="neon-btn">
          <div class="mode-content">
            <div class="mode-title">🎯 Precision</div>
            <div class="mode-desc">Short, exact, no fluff answers</div>
          </div>
        </button>

        <button class="neon-btn">
          <div class="mode-content">
            <div class="mode-title">🔥 Flame</div>
            <div class="mode-desc">Creative, bold, high-energy responses</div>
          </div>
        </button>

      </div>
    </section>

  </div>
</body>
</html>
