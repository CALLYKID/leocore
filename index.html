<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>LeoCore</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- BACKGROUND VIDEO -->
  <div id="bgLayer">
    <video id="bgVideo" autoplay muted loop playsinline>
      <source src="background.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- APP -->
  <div class="app-wrapper">

    <!-- HERO -->
    <section class="center-wrapper">

      <!-- HERO INPUT (SINGLE, UNIQUE, SAFE) -->
      <button class="hero-input" id="heroInput">
        <span class="hero-text" id="heroText">Message LeoCore</span>
        <div class="hero-energy"></div>
      </button>

      <h1 class="main-title">LEOCORE</h1>
      <p class="subtitle">Your AI. Your Vibe.</p>

    </section>

    <!-- MODES -->
    <section class="modes-wrapper">
      <h2 class="section-title">Choose Your Mode</h2>

      <div class="mode-grid">
        <button class="neon-btn"><span>⚡ Default</span></button>
        <button class="neon-btn"><span>📘 Study</span></button>
        <button class="neon-btn"><span>🔬 Research</span></button>
        <button class="neon-btn"><span>📖 Reading</span></button>
        <button class="neon-btn"><span>🧠 Deep</span></button>
        <button class="neon-btn"><span>😎 Chill</span></button>
        <button class="neon-btn"><span>🎯 Precision</span></button>
        <button class="neon-btn"><span>🔥 Flame</span></button>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
