<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>LeoCore</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- =========================================================
     BACKGROUND VIDEO — AUTHENTICITY (LOCKED)
========================================================= -->
<div id="bgLayer">
  <video id="bgVideo" autoplay muted loop playsinline preload="auto">
    <source src="waves.mp4" type="video/mp4" />
  </video>
</div>

<!-- =========================================================
     APP CONTENT
========================================================= -->
<div class="app-wrapper">

  <!-- HERO -->
  <div class="center-wrapper">

    <div class="fake-input neon-border">
      <span class="fake-text" id="fakeText">Message LeoCore</span>
    </div>

    <h1 class="main-title">LEOCORE</h1>
    <p class="subtitle">Your AI. Your Vibe.</p>

  </div>

  <!-- MODES -->
  <h2 class="section-title">Choose Your Mode</h2>

  <div class="mode-grid">

    <button class="mode-btn neon-border" data-mode="default">
      ⚡ Default
    </button>

    <button class="mode-btn neon-border" data-mode="study">
      📘 Study
    </button>

    <button class="mode-btn neon-border" data-mode="research">
      🔬 Research
    </button>

    <button class="mode-btn neon-border" data-mode="reading">
      📖 Reading
    </button>

    <button class="mode-btn neon-border" data-mode="deep">
      🧠 Deep
    </button>

    <button class="mode-btn neon-border" data-mode="chill">
      😎 Chill
    </button>

    <button class="mode-btn neon-border" data-mode="precision">
      🎯 Precision
    </button>

    <button class="mode-btn neon-border flame" data-mode="flame">
      🔥 Flame
    </button>

  </div>

</div>

</body>
</html>
