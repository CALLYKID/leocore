<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LeoCore</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- BACKGROUND VIDEO (UNCHANGED / YOUR IDENTITY) -->
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="waves.mp4" type="video/mp4">
  </video>

  <main class="app-wrapper">

    <!-- HERO -->
    <section class="hero">

      <!-- FAKE INPUT (AUTO-SIZING) -->
      <div class="fake-input neon-border glow">
        <span id="fakeText">Message LeoCore</span>
      </div>

      <h1 class="title">LEOCORE</h1>
      <p class="subtitle">Your AI. Your Vibe.</p>

    </section>

    <!-- MODES -->
    <section class="modes">
      <button class="mode-btn neon-border glow">⚡ Default</button>
      <button class="mode-btn neon-border glow">📘 Study</button>
      <button class="mode-btn neon-border glow">🔬 Research</button>
      <button class="mode-btn neon-border glow">📖 Reading</button>
      <button class="mode-btn neon-border glow">🧠 Deep</button>
      <button class="mode-btn neon-border glow">😎 Chill</button>
      <button class="mode-btn neon-border glow">🎯 Precision</button>
      <button class="mode-btn neon-border glow">🔥 Flame</button>
    </section>

  </main>

</body>
</html>
