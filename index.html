<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

  <title>LeoCore</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css?v=1">

</head>
<body>

<!-- =========================================================
     BACKGROUND VIDEO (AUTHENTICITY — DO NOT TOUCH)
========================================================= -->
<div id="bgLayer">
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="background.mp4" type="video/mp4">
  </video>
</div>

<!-- =========================================================
     APP CONTENT
========================================================= -->
<div class="app-wrapper">

  <!-- ================= HERO ================= -->
  <section class="center-wrapper">

    <button id="fakeInput" class="neon-input">
      <span id="fakeText">Message LeoCore</span>
    </button>

    <h1 class="main-title">LEOCORE</h1>
    <p class="subtitle">Your AI. Your Vibe.</p>

  </section>

  <!-- ================= MODES ================= -->
  <section class="modes-wrapper">
    <h2 class="section-title">Choose Your Mode</h2>

    <div class="mode-grid">
      <button class="neon-btn"><span class="neon-inner">⚡ Default</span></button>
      <button class="neon-btn"><span class="neon-inner">📘 Study</span></button>
      <button class="neon-btn"><span class="neon-inner">🔬 Research</span></button>
      <button class="neon-btn"><span class="neon-inner">📖 Reading</span></button>
      <button class="neon-btn"><span class="neon-inner">🧠 Deep</span></button>
      <button class="neon-btn"><span class="neon-inner">😎 Chill</span></button>
      <button class="neon-btn"><span class="neon-inner">🎯 Precision</span></button>
      <button class="neon-btn"><span class="neon-inner">🔥 Flame</span></button>
    </div>
  </section>

</div>

<!-- Scripts -->
<script src="app.js?v=1"></script>
</body>
</html>
